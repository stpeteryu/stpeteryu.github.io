name: 오늘의 말씀 생성

on:
  schedule:
    # 캐나다 동부 EDT 기준 오전 6시 = UTC 10:00
    # EST(겨울) 기준 오전 6시 = UTC 11:00
    # 둘 다 커버하려면 UTC 10:00 실행
    - cron: '0 10 * * *'
  workflow_dispatch:   # 수동 실행 허용

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 pytz

      - name: 오늘의 말씀 스크래핑
        run: python scripts/fetch_daily_mass.py

      - name: daily-mass.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-mass.json
          git diff --staged --quiet || git commit -m "📖 오늘의 말씀 $(date +'%Y-%m-%d')"
          git push
